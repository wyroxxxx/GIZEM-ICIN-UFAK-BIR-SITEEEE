<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuz Sevgi ve Hello Kitty 🎀</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #ffc0cb; /* Hello Kitty Pembesi */
            overflow: hidden;
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Yağmur gibi yağan Hello Kittyler */
        .hello-kitty {
            position: absolute;
            font-size: 45px;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(2px 2px 5px rgba(255,105,180,0.5));
        }

        .container {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.9);
            border: 5px solid #ff69b4;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(255,20,147,0.3);
            max-width: 450px;
            width: 85%;
            z-index: 100;
            position: relative;
            animation: fadeIn 2s ease-in;
        }

        h1 {
            font-size: 2.2rem;
            color: #ff1493;
            margin-bottom: 5px;
        }

        .song-tag {
            font-size: 0.8rem;
            color: #ff69b4;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .bow {
            font-size: 60px;
            animation: bounce 1s infinite alternate;
        }

        #infinity-box {
            height: 100px;
            overflow: hidden;
            position: relative;
            margin-top: 20px;
            border-top: 2px dashed #ff69b4;
            padding-top: 10px;
        }

        #scrolling-text {
            font-size: 1.2rem;
            color: #ff1493;
            font-weight: bold;
            position: absolute;
            width: 100%;
        }

        .music-btn {
            margin-top: 25px;
            padding: 15px 30px;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255,20,147,0.4);
            transition: all 0.3s;
        }

        .music-btn:hover {
            background-color: #ff1493;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to
